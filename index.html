<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C7OS Launcher</title>
    <style>
        :root { --accent: #e50914; --bg: #050505; --card-w: 220px; --card-h: 125px; }
        
        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 40px; overflow: hidden; height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        .monitor { position: fixed; top: 20px; right: 40px; color: #00ff00; font-family: monospace; font-size: 14px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo { font-size: 2.5rem; font-weight: bold; color: var(--accent); letter-spacing: 2px; }

        /* --- GRID PRINCIPAL (HOME) --- */
        .grid-home { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 25px; 
        }

        .app-main {
            aspect-ratio: 16 / 9; background: #111; border: 4px solid #333; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; outline: none; transition: 0.3s;
        }
        .app-main:focus { border-color: white; transform: scale(1.08); background: var(--accent); box-shadow: 0 0 20px rgba(229, 9, 20, 0.5); }
        .app-main .icon { font-size: 3.5rem; object-fit: contain; margin-bottom: 10px; }

        /* --- FREE STORY (OVERLAY ESTILO STREAMING) --- */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column;
            animation: fadeIn 0.3s;
        }

        .top-bar { padding: 30px 50px; display: flex; align-items: center; gap: 30px; border-bottom: 1px solid #333; }
        .btn-back { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .section-title { margin: 30px 50px 15px; font-size: 1.3rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        /* LISTA HORIZONTAL DE APKS/CONTEÚDO */
        .store-row { 
            display: flex; gap: 20px; padding: 10px 50px; overflow-x: auto; 
            scrollbar-width: none; /* Esconde scroll no Firefox */
        }
        .store-row::-webkit-scrollbar { display: none; }

        .card-apk {
            min-width: var(--card-w); height: var(--card-h); background: #151515; 
            border-radius: 10px; border: 2px solid #222; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.3s; cursor: pointer; outline: none;
        }
        .card-apk:focus { border-color: #00ff00; transform: scale(1.1); background: #222; z-index: 10; }
        
        .card-apk .badge { position: absolute; top: 10px; right: 10px; font-size: 10px; background: #00ff00; color: black; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .card-apk span { font-size: 2rem; margin-bottom: 5px; }
        .card-apk .label { font-size: 0.9rem; font-weight: 500; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="monitor">SISTEMA OK | RAM: <span id="ram">0MB</span></div>

    <div class="header">
        <div class="logo">C7OS</div>
        <div id="clock" style="font-size: 1.5rem; font-weight: 300;">00:00</div>
    </div>

    <div class="grid-home" id="main-nav">
        <div class="app-main" tabindex="1" onclick="abrir('https://www.youtube.com/tv')">
            <div class="icon">📺</div><div class="label">YouTube TV</div>
        </div>
        <div class="app-main" tabindex="2" onclick="abrir('https://www.google.com')">
            <div class="icon">🌐</div><div class="label">Navegador</div>
        </div>
        <div class="app-main" tabindex="3" onclick="abrirFreeStory()">
            <div class="icon">🎬</div><div class="label">FREE STORY</div>
        </div>
    </div>

    <div id="free-story" class="overlay">
        <div class="top-bar">
            <button class="btn-back" id="back-btn" onclick="fecharFreeStory()">⬅ VOLTAR</button>
            <h2 style="margin:0">CENTRAL DE APLICATIVOS</h2>
        </div>

        <p class="section-title">Recomendados para Teste</p>
        <div class="store-row">
            <div class="card-apk" tabindex="10" onclick="abrir('https://www.netflix.com')">
                <div class="badge">WEB</div>
                <span>🍿</span><div class="label">Netflix</div>
            </div>
        </div>

        <p class="section-title">Instalação Direta (APKs C7)</p>
        <div class="store-row">
            <div class="card-apk" tabindex="20" onclick="baixar('C7 Player', 'https://seu-link-github.apk')">
                <div class="badge">APK</div>
                <span>📥</span><div class="label">Instalar C7 Player</div>
            </div>
            
            <div class="card-apk" tabindex="21" onclick="baixar('C7 Cine', 'https://seu-link-github.apk')">
                <div class="badge">APK</div>
                <span>🎥</span><div class="label">C7 Cine</div>
            </div>
        </div>
    </div>

    <script>
        // Relógio nativo
        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('clock').innerText = agora.getHours().toString().padStart(2,'0') + ":" + agora.getMinutes().toString().padStart(2,'0');
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        // Foco inicial
        window.onload = () => document.querySelector('.app-main').focus();

        // Ponte com Android
        function abrir(url) {
            if(window.AndroidBridge) window.AndroidBridge.openUrl(url);
            else window.location.href = url;
        }

        function baixar(nome, url) {
            if(confirm("Deseja baixar e instalar " + nome + "?")) {
                if(window.AndroidBridge) window.AndroidBridge.downloadAPK(url);
                else alert("Ponte Android não detectada para download.");
            }
        }

        // Navegação Free Story
        function abrirFreeStory() {
            document.getElementById('free-story').style.display = 'flex';
            document.getElementById('back-btn').focus();
        }

        function fecharFreeStory() {
            document.getElementById('free-story').style.display = 'none';
            document.getElementById('main-nav').children[2].focus(); // Volta o foco para o botão Free Story
        }

        // Recebe dados da MainActivity.java
        function updateStats(cpu, ram) {
            document.getElementById('ram').innerText = ram + "MB";
        }
    </script>
</body>
</html>
