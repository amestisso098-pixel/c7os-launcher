<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C7OS Launcher</title>
    <style>
        :root { --accent: #e50914; --bg: #050505; }
        
        /* FIXAÇÃO DE TELA ANTI-ESTICAMENTO */
        html, body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            overflow: hidden; position: fixed; background: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif; color: white;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 30px 50px; }
        .logo { font-size: 2.2rem; font-weight: bold; color: var(--accent); letter-spacing: 2px; }

        /* GRID DA HOME */
        .grid-home { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 30px; padding: 0 50px; max-width: 1200px; margin: 0 auto;
        }

        .btn-app {
            background: #111; border: 4px solid #333; border-radius: 15px;
            aspect-ratio: 16 / 9; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            transition: 0.25s; outline: none;
        }

        /* FOCO DO CONTROLE REMOTO */
        .btn-app:focus, .card-apk:focus, .btn-back:focus {
            border-color: white; transform: scale(1.08); background: var(--accent);
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.5); z-index: 10;
        }

        .btn-app span { font-size: 3.5rem; margin-bottom: 10px; }

        /* FREE STORY OVERLAY */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 1000; flex-direction: column;
        }
        .top-bar { padding: 30px 50px; display: flex; align-items: center; gap: 30px; border-bottom: 1px solid #333; }
        .btn-back { background: #222; border: 2px solid #444; color: white; padding: 12px 24px; border-radius: 8px; cursor: pointer; }

        .store-row { display: flex; gap: 25px; padding: 40px 50px; }
        
        .card-apk {
            width: 240px; height: 140px; background: #181818; border: 3px solid #333;
            border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative; outline: none;
        }

        .status-badge { 
            position: absolute; bottom: 15px; font-size: 11px; font-weight: bold; 
            color: #00ff00; display: none; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">C7OS</div>
        <div id="clock" style="font-size: 1.6rem;">00:00</div>
    </div>

    <div class="grid-home" id="main-grid">
        <div class="btn-app" tabindex="1" onclick="abrir('https://www.youtube.com/tv')">
            <span>📺</span><div>YouTube TV</div>
        </div>
        <div class="btn-app" tabindex="2" onclick="abrir('https://www.google.com')">
            <span>🌐</span><div>Navegador</div>
        </div>
        <div class="btn-app" tabindex="3" onclick="abrirFS()">
            <span>🎬</span><div>FREE STORY</div>
        </div>
    </div>

    <div id="free-story" class="overlay">
        <div class="top-bar">
            <button class="btn-back" id="back-btn" onclick="fecharFS()">⬅ VOLTAR</button>
            <h2 style="margin:0">LOJA DE APPS</h2>
        </div>
        
        <div class="store-row">
            <div class="card-apk" id="btn-c7" tabindex="10" onclick="iniciarBaixar('C7 Cine', 'https://github.com/amestisso098-pixel/c7os-launcher/releases/download/v1.0/Cinema.V1_Vip.-.v4.0.7_Tekmods.com.apk')">
                <span style="font-size: 2.5rem;">🎥</span>
                <div>Instalar C7 Cine</div>
                <div class="status-badge" id="status-text">Baixando...</div>
            </div>
        </div>
    </div>

    <script>
        // Relógio
        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('clock').innerText = agora.getHours().toString().padStart(2,'0') + ":" + agora.getMinutes().toString().padStart(2,'0');
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        // Foco inicial
        window.onload = () => document.querySelector('.btn-app').focus();

        // Navegação
        function abrir(url) {
            if(window.AndroidBridge) window.AndroidBridge.openUrl(url);
            else window.location.href = url;
        }

        function abrirFS() {
            document.getElementById('free-story').style.display = 'flex';
            setTimeout(() => document.getElementById('btn-c7').focus(), 100);
        }

        function fecharFS() {
            document.getElementById('free-story').style.display = 'none';
            document.getElementById('main-grid').children[2].focus();
        }

        // Sistema de Download com Status
        function iniciarBaixar(nome, url) {
            const status = document.getElementById('status-text');
            status.style.display = 'block';
            
            if(window.AndroidBridge) {
                window.AndroidBridge.baixarAPK(url);
            }

            // Simulação de status enquanto o Android processa o download no topo
            setTimeout(() => {
                status.innerText = "Verifique o topo da TV";
                setTimeout(() => { status.style.display = 'none'; status.innerText = "Baixando..."; }, 6000);
            }, 2500);
        }
    </script>
</body>
</html>
